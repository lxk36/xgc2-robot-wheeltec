### Wheeltec onboard swarm_ros_bridge topic configuration.
### The current generic bridge binary supports sensor_msgs/Imu,
### geometry_msgs/Twist, and std_msgs/String.

IP:
  self: '*'
  qgc: 192.168.51.199
  test_local: 127.0.0.1

send_topics:
- topic_name: /imu
  msg_type: sensor_msgs/Imu
  max_freq: 20
  srcIP: self
  srcPort: 3001

recv_topics:
- topic_name: /cmd_vel
  msg_type: geometry_msgs/Twist
  # Required by the current generic bridge parser.  Receive-side throttling is
  # not implemented by that binary, so zero is used as a compatibility value.
  max_freq: 0
  srcIP: qgc
  srcPort: 3005
