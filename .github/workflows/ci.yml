name: ci

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  package-compliance:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Install compliance tools
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends libxml2-utils shellcheck

    - name: Check package metadata and source files
      run: .xgc2/scripts/check_package_compliance.sh

  build-debs:
    strategy:
      fail-fast: false
      matrix:
        include:
        - arch: amd64
          runner: ubuntu-latest
        - arch: arm64
          runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v4

    - name: Build and install-check Debian packages
      run: |
        .xgc2/scripts/build_debs_in_docker.sh \
          --work-dir "$RUNNER_TEMP/xgc2-wheeltec-${{ matrix.arch }}" \
          --output-dir "$GITHUB_WORKSPACE/debs"

    - name: Create trusted build manifest
      run: |
        set -euo pipefail
        mkdir -p .ci/build-manifests
        product_version="$(awk -F': *' '/^version:/ {print $2; exit}' .xgc2/product.yml)"
        python3 .xgc2/scripts/xgc2_artifact_manifest.py build \
          --deb-dir debs \
          --output-dir .ci/build-manifests \
          --product xgc2-wheeltec-onboard-ros1 \
          --product-version "$product_version" \
          --distribution bionic \
          --architecture "${{ matrix.arch }}" \
          --source-sha "$GITHUB_SHA" \
          --ci-run-id "$GITHUB_RUN_ID" \
          --ci-workflow "$GITHUB_WORKFLOW" \
          --ci-workflow-ref "$GITHUB_WORKFLOW_REF"

    - name: Upload Debian packages
      uses: actions/upload-artifact@v4
      with:
        name: xgc2-wheeltec-onboard-ros1-debs-${{ matrix.arch }}
        path: |
          debs/*.deb
          .ci/build-manifests/*.json
        retention-days: 14
        include-hidden-files: true
